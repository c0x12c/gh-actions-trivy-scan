name: Trivy Vulnerability Scan

on:
  workflow_call:
    inputs:
      scan_type:
        description: "Trivy scan type: config (IaC), fs (filesystem/deps), or repo (git repo)."
        required: true
        type: string
      scan_ref:
        description: "Path or git URL to scan. Defaults to repo root."
        required: false
        type: string
        default: "."
      setup_gradle:
        description: "Set up JDK + Gradle + AWS-OIDC CodeArtifact and generate an ephemeral gradle.lockfile (runtimeClasspath only) before scanning. Required for Gradle repos because Trivy fs needs a lockfile to read transitive deps. Pass the aws_role_to_assume / aws_account_id secrets and have id-token: write at the workflow level."
        required: false
        type: boolean
        default: false
      java_version:
        description: "JDK version used when setup_gradle is true."
        required: false
        type: string
        default: "17"
      gradle_repo_url:
        description: "Maven repo URL written to gradle.properties as artifactRegistryMavenReleaseUrl. Required when setup_gradle is true."
        required: false
        type: string
        default: ""
      gradle_repo_username:
        description: "Username written to gradle.properties as artifactRegistryMavenUsername (CodeArtifact convention)."
        required: false
        type: string
        default: "aws"
      aws_region:
        description: "AWS region for the CodeArtifact domain. Required when setup_gradle is true."
        required: false
        type: string
        default: ""
      aws_codeartifact_domain:
        description: "AWS CodeArtifact domain name. Required when setup_gradle is true."
        required: false
        type: string
        default: ""
    secrets:
      aws_role_to_assume:
        description: "AWS IAM role ARN to assume via OIDC for CodeArtifact access. Required when setup_gradle is true."
        required: false
      aws_account_id:
        description: "AWS account ID that owns the CodeArtifact domain. Required when setup_gradle is true."
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  trivy:
    name: Trivy Scan (${{ inputs.scan_type }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy scan
        uses: c0x12c/gh-actions-trivy-scan/actions/trivy@v1
        with:
          scan_type: ${{ inputs.scan_type }}
          scan_ref: ${{ inputs.scan_ref }}
          setup_gradle: ${{ inputs.setup_gradle }}
          java_version: ${{ inputs.java_version }}
          gradle_repo_url: ${{ inputs.gradle_repo_url }}
          gradle_repo_username: ${{ inputs.gradle_repo_username }}
          aws_role_to_assume: ${{ secrets.aws_role_to_assume }}
          aws_account_id: ${{ secrets.aws_account_id }}
          aws_region: ${{ inputs.aws_region }}
          aws_codeartifact_domain: ${{ inputs.aws_codeartifact_domain }}
