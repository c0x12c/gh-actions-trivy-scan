name: "Generalized Terraform Apply Workflow"
description: "A reusable action for running Terraform plan in any environment"

inputs:
  gcp_project_id:
    description: "GCP Project ID to use"
    required: true
  gcp_service_account:
    description: "The GCP Service Account to use for authentication"
    required: true
  gcp_workload_identity_provider:
    description: "The GCP Workload Identity Provider to use"
    required: true
  environment:
    description: "The environment to use (e.g., dev, prod)"
    required: true
  python_version:
    description: "Python version to use"
    required: false
    default: "3.12"
  secret_filter:
    description: "The filter name to use with git-secret-protector"
    required: false
    default: ""
  slack_webhook_url:
    description: "The Slack Webhook URL for posting deployment notifications"
    required: false
    default: ""
  terraform_version:
    description: "Terraform version to use"
    required: false
    default: "1.8.4"
  working_dir:
    description: "The working directory for Terraform files"
    required: true
  refresh:
    description: "Whether to refresh the state before applying (true/false)."
    required: false
    default: "true"
  github_token:
    description: "GitHub Token required to post comments to PR"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Config Terraform plugin cache
      shell: bash
      run: |
        echo 'plugin_cache_dir="$HOME/.terraform.d/plugin-cache"' >~/.terraformrc
        mkdir --parents ~/.terraform.d/plugin-cache

    - name: Cache Terraform
      uses: actions/cache@v5
      with:
        path: |
          ~/.terraform.d/plugin-cache
        key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
        restore-keys: |
          ${{ runner.os }}-terraform-

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v3
      with:
        create_credentials_file: true
        project_id: ${{ inputs.gcp_project_id }}
        service_account: ${{ inputs.gcp_service_account }}
        workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}

    - name: Decrypt Secrets
      if: ${{ inputs.secret_filter != '' }}
      uses: c0x12c/gh-actions-git-secret-protector@v1
      with:
        filter: ${{ inputs.secret_filter }}

    - name: Terraform Init
      id: init
      shell: bash
      run: terraform init
      working-directory: ${{ inputs.working_dir }}

    - name: Terraform Plan
      id: plan
      shell: bash
      run: |
        terraform plan -input=false -no-color -lock=false -refresh=${{ inputs.refresh }} -out=/tmp/plan.tmp
        terraform show -no-color /tmp/plan.tmp > /tmp/plan.out
      continue-on-error: true
      working-directory: ${{ inputs.working_dir }}

    - name: Terraform Apply
      id: tf_apply
      shell: bash
      run: terraform apply -input=false -auto-approve -refresh=${{ inputs.refresh }} /tmp/plan.tmp
      working-directory: ${{ inputs.working_dir }}

    - name: Send Notification to Slack on success
      uses: c0x12c/gh-actions-slack-notify@v0.1.3
      if: success() && inputs.slack_webhook_url != ''
      with:
        webhook_url: ${{ inputs.slack_webhook_url }}
        title: '✅ *${{ github.event.repository.name }} - Terraform Apply SUCCESS in ${{ inputs.environment }}*'

    - name: Send Notification to Slack on failure
      uses: c0x12c/gh-actions-slack-notify@v0.1.3
      if: failure() && inputs.slack_webhook_url != ''
      with:
        webhook_url: ${{ inputs.slack_webhook_url }}
        title: '❌ *${{ github.event.repository.name }} - Terraform Apply FAILED in ${{ inputs.environment }}*'

    - name: Post Terraform Apply Results to PR
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request' && inputs.github_token != ''
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs')

          let plan = fs.readFileSync('/tmp/plan.out', 'utf8').replace(/`/g, '\\`')
          fs.unlinkSync('/tmp/plan.out')

          const environment = '${{ inputs.environment }}'.toUpperCase()

          // GitHub comment body limit is 65536 characters
          const MAX_COMMENT_LENGTH = 65536

          // Calculate the base template size (without the plan content)
          const baseHeader = `#### Environment: ${environment}
          #### Terraform Apply 🚀\`${{ steps.tf_apply.outcome }}\`

          <details><summary>Show Plan</summary>

          \`\`\`\n
          `;

          const baseFooter = `
          \`\`\`

          </details>

          *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Working Directory: \`${{ inputs.working_dir }}\`, Workflow: \`${{ github.workflow }}\`*`;

          const baseLength = baseHeader.length + baseFooter.length;
          let output;

          // Check if comment exceeds GitHub's limit and truncate if necessary
          if (baseLength + plan.length > MAX_COMMENT_LENGTH) {
            const availableForPlan = MAX_COMMENT_LENGTH - baseLength;
            const truncationNotice = `\n\n... [Plan truncated - showing first ${availableForPlan} characters only. See workflow logs for full output.] ...`;
            const maxPlanLength = availableForPlan - truncationNotice.length;

            if (maxPlanLength > 0) {
              const truncatedPlan = plan.substring(0, maxPlanLength) + truncationNotice;
              output = `${baseHeader}${truncatedPlan}${baseFooter}`;
            } else {
              output = `#### Environment: ${environment}

              #### Terraform Apply 🚀\`${{ steps.tf_apply.outcome }}\`

              Plan output is too large to display. Please check the workflow logs for the full plan.

              *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Working Directory: \`${{ inputs.working_dir }}\`, Workflow: \`${{ github.workflow }}\`*`;
            }
          } else {
            output = `${baseHeader}${plan}${baseFooter}`;
          }

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })
